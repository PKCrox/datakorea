<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>DataKorea — 한국 데이터 접근성 지도</title>
<meta name="description" content="한국 1,354개 기관, 95,000+ 데이터셋의 접근성을 한눈에. 듀얼트랙 AI 스코어링. 오픈소스.">
<meta property="og:type" content="website">
<meta property="og:title" content="DataKorea — 한국 데이터 접근성 지도">
<meta property="og:description" content="1,354개 기관, 95,000+ 데이터셋. 공공·민간 듀얼트랙 스코어링. 오픈소스.">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="DataKorea — 한국 데이터 접근성 지도">
<meta name="twitter:description" content="1,354개 기관, 95,000+ 데이터셋. 공공·민간 듀얼트랙 스코어링.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg0: #0C0C0D; --bg1: #141316; --bg2: #1A191D; --panel: #1A191D;
    --line: rgba(255,248,235,0.09); --line-soft: rgba(255,248,235,0.04);
    --text: #F2EDE4; --muted: #8C8070; --dim: #524842;
    --accent: #F5A623; --accent-soft: rgba(245,166,35,0.12); --glow: rgba(245,166,35,0.05);
    --up: #00E5A0; --up-soft: rgba(0,229,160,0.12);
    --down: #FF5E7D; --down-soft: rgba(255,94,125,0.12);
    --warn: #FFB84D;
    --mono: 'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --head: 'Barlow Condensed', -apple-system, sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body { font-family: var(--sans); font-size: 14px; line-height: 1.5; color: var(--text);
    background: var(--bg0); min-height: 100dvh;
    padding-top: env(safe-area-inset-top, 0); padding-bottom: env(safe-area-inset-bottom, 0); }

  /* ── Film grain (keep, no scanlines) ── */
  body::before { content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9999; opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }

  /* ── Strip ── */
  .strip { position: sticky; top: 0; z-index: 50; display: flex; align-items: center; gap: 0;
    padding: 0; background: rgba(12,12,13,0.94); backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--line); overflow-x: auto; white-space: nowrap; scrollbar-width: none; }
  .strip::-webkit-scrollbar { display: none; }
  .strip-brand { font-family: var(--head); font-size: 14px; font-weight: 700; color: var(--accent);
    letter-spacing: 2px; padding: 8px 16px; text-transform: uppercase; flex-shrink: 0;
    border-right: 1px solid var(--line); }
  .strip-item { display: flex; align-items: center; gap: 4px; padding: 8px 14px;
    border-right: 1px solid var(--line-soft); flex-shrink: 0; }
  .strip-val { font-family: var(--mono); font-size: 12px; font-weight: 500; color: var(--text); }
  .strip-lbl { font-family: var(--mono); font-size: 10px; color: var(--dim); }

  /* ── Container ── */
  .wrap { max-width: 1200px; margin: 0 auto; padding: 20px 16px 80px; }

  /* ── Hero ── */
  .hero { margin-bottom: 24px; position: relative; }
  .hero h1 { font-family: var(--head); font-size: 2rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 3px; color: var(--accent); margin-bottom: 2px; position: relative; }
  .hero .sub { font-size: 12px; color: var(--muted); margin-bottom: 16px; letter-spacing: 0.5px; }

  /* ── KPI Grid ── */
  .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 18px; }
  .kpi-card { background: var(--bg1); border: 1px solid var(--line); border-radius: 8px;
    padding: 14px 16px; position: relative; overflow: hidden; }
  .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
  .kpi-card:nth-child(1)::before { background: var(--accent); }
  .kpi-card:nth-child(2)::before { background: var(--up); }
  .kpi-card:nth-child(3)::before { background: var(--warn); }
  .kpi-n { font-family: var(--mono); font-size: clamp(1.4rem, 3.5vw, 2rem); font-weight: 500;
    color: var(--text); letter-spacing: -0.5px; line-height: 1.1; }
  .kpi-label { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .kpi-sub { font-family: var(--mono); font-size: 10px; color: var(--dim); margin-top: 6px; }
  .kpi-bar { height: 3px; border-radius: 2px; background: rgba(255,255,255,0.04); margin-top: 6px; overflow: hidden; }
  .kpi-bar-fill { height: 100%; border-radius: 2px; transition: width 1s cubic-bezier(0.16,1,0.3,1); }

  .search-row { display: flex; gap: 8px; max-width: 520px; }
  .search-row input { flex: 1; padding: 10px 14px; background: var(--bg1); border: 1px solid var(--line);
    border-radius: 6px; color: var(--text); font-family: var(--sans); font-size: 13px; outline: none;
    transition: border-color 0.15s; }
  .search-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(245,166,35,0.1); }
  .search-row input::placeholder { color: var(--dim); }
  .search-row button { padding: 10px 18px; background: var(--accent-soft); border: 1px solid rgba(245,166,35,0.3);
    border-radius: 6px; color: var(--accent); font-family: var(--sans); font-size: 12px;
    font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
  .search-row button:hover { background: rgba(245,166,35,0.2); }

  /* ── Tier histogram ── */
  .tier-panel { background: var(--bg1); border: 1px solid var(--line); border-radius: 8px;
    overflow: hidden; margin-bottom: 16px; }
  .tier-panel .panel-head { padding: 10px 16px; }
  .tier-rows { padding: 10px 16px 14px; }
  .tier-row { display: grid; grid-template-columns: 90px 1fr 36px; align-items: center; gap: 10px; margin-bottom: 6px; }
  .tier-label { font-family: var(--mono); font-size: 10px; color: var(--muted); text-align: right; white-space: nowrap; }
  .tier-track { height: 16px; border-radius: 3px; background: rgba(255,255,255,0.03); overflow: hidden; cursor: pointer; }
  .tier-fill { height: 100%; border-radius: 3px; transition: width 0.8s cubic-bezier(0.16,1,0.3,1); position: relative; }
  .tier-fill::after { content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent 60%, rgba(255,255,255,0.08)); }
  .tier-count { font-family: var(--mono); font-size: 11px; color: var(--text); font-weight: 500; }

  /* ── Leaderboard ── */
  .lb-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .lb-col { background: var(--bg1); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
  .lb-col-head { padding: 10px 14px; border-bottom: 1px solid var(--line);
    font-family: var(--head); font-size: 12px; font-weight: 600; letter-spacing: 0.8px;
    text-transform: uppercase; display: flex; align-items: center; justify-content: space-between; }
  .lb-track-pub { color: var(--accent); }
  .lb-track-prv { color: #B794F6; }
  .lb-row { display: flex; align-items: center; gap: 6px; padding: 6px 12px;
    border-bottom: 1px solid var(--line-soft); cursor: pointer; transition: background 0.1s; }
  .lb-row:hover { background: var(--glow); }
  .lb-rank { font-family: var(--mono); font-size: 10px; color: var(--dim); width: 18px; flex-shrink: 0; text-align: right; }
  .lb-name { flex: 1; font-size: 12px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .lb-bar-wrap { width: 50px; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.06); flex-shrink: 0; }
  .lb-bar-fill { height: 100%; border-radius: 2px; }
  .lb-score { font-family: var(--mono); font-size: 11px; font-weight: 600; width: 22px; text-align: right; flex-shrink: 0; }
  .lb-badge { font-family: var(--mono); font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 600;
    white-space: nowrap; flex-shrink: 0; }

  /* ── Tab bar ── */
  .tab-bar { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 1px solid var(--line); }
  .tab-btn { padding: 10px 20px; border: none; background: none; font-family: var(--sans); font-size: 14px;
    font-weight: 600; color: var(--muted); cursor: pointer; transition: all 0.15s;
    border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab-btn:hover:not(.active) { color: var(--text); }
  .tab-count { font-family: var(--mono); font-size: 11px; color: var(--dim); margin-left: 6px; }

  /* ── Panel (content) ── */
  .panel { background: var(--bg1); border: 1px solid var(--line); border-radius: 8px;
    overflow: hidden; margin-bottom: 16px; }
  .panel-head { padding: 12px 16px; font-family: var(--head); font-size: 14px; font-weight: 600;
    letter-spacing: 0.5px; text-transform: uppercase; color: var(--muted);
    border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; }
  .badge-src { font-family: var(--mono); font-size: 10px; font-weight: 400; color: var(--dim);
    text-transform: none; letter-spacing: 0; }

  /* ── Main table ── */
  .tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
  .tbl th { text-align: left; padding: 8px 12px; font-family: var(--mono); font-size: 11px; font-weight: 500;
    color: var(--dim); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--line);
    cursor: pointer; user-select: none; white-space: nowrap; }
  .tbl th:hover { color: var(--muted); }
  .tbl th.sorted { color: var(--accent); }
  .tbl td { padding: 7px 12px; border-bottom: 1px solid var(--line-soft); vertical-align: middle; }
  .tbl tr:hover > td { background: var(--glow); }
  .tbl tr.active > td { background: var(--accent-soft); }
  .tbl .n { font-family: var(--mono); font-variant-numeric: tabular-nums; font-weight: 500; }
  .tbl .r { text-align: right; }
  .tbl .sector-name { font-weight: 600; cursor: pointer; white-space: nowrap; }
  .tbl .sector-name:hover { color: var(--accent); }
  .tbl .org-name { font-weight: 500; cursor: pointer; }
  .tbl .org-name:hover { color: var(--accent); }

  /* Stage bar */
  .stage { display: flex; height: 8px; border-radius: 4px; overflow: hidden; background: rgba(255,255,255,0.04); min-width: 100px; }
  .stage .s { height: 100%; min-width: 1px; }
  .pill { display: inline-block; padding: 1px 6px; border-radius: 3px; font-family: var(--mono); font-size: 9px; font-weight: 500; white-space: nowrap; }

  /* ── Scatter ── */
  .scatter-panel { position: relative; }
  .scatter-panel .panel-head { cursor: pointer; }
  .scatter-wrap { padding: 12px; position: relative; }
  .scatter-wrap canvas { width: 100%; height: 300px; display: block; border-radius: 4px; cursor: default; }

  /* ── Toggle (scatter/tab) ── */
  .toggle-group { display: inline-flex; gap: 2px; background: rgba(255,255,255,0.04); border-radius: 5px; padding: 2px; }
  .toggle-btn { padding: 5px 12px; border-radius: 4px; border: none; background: none;
    font-family: var(--sans); font-size: 12px; font-weight: 600; color: var(--dim); cursor: pointer; transition: all 0.15s; user-select: none; }
  .toggle-btn:hover { color: var(--muted); }
  .toggle-btn.active { background: var(--accent); color: #0C0C0D; }
  .toggle-btn .cnt { font-family: var(--mono); font-size: 11px; font-weight: 400; margin-left: 4px; opacity: 0.7; }
  .toggle-btn.active .cnt { opacity: 1; }

  /* ── Sub-panel (sector expand) ── */
  .sub-panel > td { padding: 0 !important; background: var(--panel) !important; }
  .sub-panel .tbl td { padding: 6px 12px; font-size: 12px; border-bottom-color: rgba(255,248,235,0.03); }
  .sub-panel .tbl tr:hover > td { background: rgba(245,166,35,0.04); }
  .sub-note { font-size: 10px; color: var(--dim); padding: 4px 10px 8px; }

  /* ── Region hierarchy ── */
  .rgn-head > td { background: rgba(245,166,35,0.03) !important; border-bottom-color: rgba(255,248,235,0.06) !important; }
  .rgn-head .rgn-label { font-weight: 600; cursor: pointer; white-space: nowrap; }
  .rgn-head .rgn-label:hover { color: var(--accent); }
  .rgn-head .rgn-count { font-family: var(--mono); font-size: 10px; color: var(--dim); font-weight: 400; margin-left: 6px; }
  .rgn-child > td { padding-left: 28px !important; }
  .rgn-child { opacity: 0; transform: translateY(-3px); animation: domSlide 0.12s ease forwards; }
  .org-link-btn { margin-left: 6px; text-decoration: none; font-size: 10px; opacity: 0.3; transition: opacity 0.15s; }
  .org-link-btn:hover { opacity: 0.9; }

  /* ── Org detail ── */
  .org-detail-row > td { padding: 0 !important; }
  .org-detail { padding: 8px 14px; background: rgba(245,166,35,0.03); border-left: 2px solid var(--accent); }
  .org-detail-head { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .od-link { font-size: 11px; color: var(--accent); text-decoration: none; }
  .od-link:hover { text-decoration: underline; }
  .dim-breakdown { display: flex; gap: 10px; flex-wrap: wrap; margin: 6px 0; }
  .dim-item { display: flex; align-items: center; gap: 4px; }
  .dim-item-label { font-family: var(--mono); font-size: 9px; color: var(--dim); width: 32px; text-align: right; }
  .dim-item-bar { width: 40px; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.06); overflow: hidden; }
  .dim-item-fill { height: 100%; border-radius: 2px; }
  .dim-item-val { font-family: var(--mono); font-size: 10px; font-weight: 500; color: var(--text); width: 18px; }

  /* ── Private company row ── */
  .pc-name { font-weight: 600; cursor: pointer; }
  .pc-name:hover { color: var(--accent); }
  .pc-ind { font-family: var(--mono); font-size: 10px; color: var(--dim); margin-left: 6px; }
  .pc-gap-wrap { display: flex; align-items: center; gap: 8px; }
  .pc-gap-frac { font-family: var(--mono); font-size: 11px; color: var(--dim); white-space: nowrap; }
  .pc-gap-bar { display: flex; gap: 2px; min-width: 80px; align-items: center; }
  .pc-gap-seg { display: flex; flex-direction: column; align-items: center; gap: 1px; }
  .pc-gap-seg .bar { height: 8px; border-radius: 2px; min-width: 6px; }
  .pc-gap-seg .lbl { font-family: var(--mono); font-size: 8px; white-space: nowrap; opacity: 0.7; }
  .pc-gap-pct { font-family: var(--mono); font-size: 12px; font-weight: 600; }

  /* ── Domain rows (cascade expand) ── */
  .dom-row { opacity: 0; transform: translateY(-4px); animation: domSlide 0.15s ease forwards; }
  @keyframes domSlide { to { opacity: 1; transform: none; } }
  .dom-row > td { padding: 5px 12px !important; font-size: 12px; border-bottom-color: rgba(255,248,235,0.03) !important; }
  .dom-row:hover > td { background: rgba(245,166,35,0.03); }
  .dom-sec-row > td { padding: 6px 12px 4px !important; border-bottom: none !important; }
  .dom-sec-label { font-family: var(--mono); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
  .priv-detail { background: var(--panel); border-bottom: 1px solid var(--line); padding: 16px; }
  .ds-row { display: flex; align-items: center; gap: 8px; padding: 3px 0; font-size: 12px; }
  .ds-row .ds-name { flex: 1; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ds-badge { font-family: var(--mono); font-size: 10px; padding: 2px 6px; border-radius: 3px; font-weight: 500; }
  .ds-badge.api { background: var(--accent-soft); color: var(--accent); }

  /* ── Domain badges ── */
  .dom-badge { font-family: var(--mono); font-size: 10px; padding: 3px 8px; border-radius: 3px; font-weight: 600; white-space: nowrap; }
  .dom-badge.b-open { background: rgba(0,229,160,0.12); color: #00E5A0; }
  .dom-badge.b-paid { background: rgba(74,158,255,0.12); color: #6eaadd; }
  .dom-badge.b-partner { background: rgba(255,184,77,0.12); color: #FFB84D; }
  .dom-badge.b-internal { background: rgba(255,94,125,0.10); color: #FF5E7D; }
  .dom-badge.b-unknown { background: rgba(255,255,255,0.04); color: var(--dim); }

  /* ── Tier badge ── */
  .tier-badge { font-family: var(--mono); font-size: 9px; padding: 2px 6px; border-radius: 3px;
    font-weight: 600; white-space: nowrap; letter-spacing: 0.3px; display: inline-block; margin-left: 6px; }

  /* ── Search ── */
  .sr-back { font-size: 12px; color: var(--accent); cursor: pointer; display: inline-block; margin-bottom: 12px; }
  .sr-back:hover { text-decoration: underline; }
  .sr-count { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
  .sr-section { font-family: var(--head); font-size: 13px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--muted); margin: 16px 0 8px; padding-left: 8px;
    border-left: 2px solid var(--accent); }
  .sr-item { background: var(--bg1); border: 1px solid var(--line); border-radius: 6px;
    padding: 8px 12px; margin-bottom: 6px; }
  .sr-ds { font-size: 13px; font-weight: 600; }
  .sr-org { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .sr-desc { font-size: 11px; color: var(--dim); margin-top: 2px; }
  .sr-tags { display: flex; gap: 4px; margin-top: 4px; }

  /* ── Tooltip ── */
  .tooltip { position: fixed; z-index: 1000; display: none; padding: 8px 12px;
    background: rgba(20,19,22,0.96); border: 1px solid var(--line); border-radius: 6px;
    font-size: 12px; line-height: 1.5; color: var(--text); pointer-events: none;
    max-width: 280px; backdrop-filter: blur(8px); }
  .tooltip b { color: var(--accent); font-weight: 600; }
  .tooltip .tv { color: var(--text); font-family: var(--mono); font-weight: 500; }

  /* ── Legend ── */
  .legend { padding: 10px 16px; display: flex; gap: 12px; flex-wrap: wrap; border-top: 1px solid var(--line); }
  .legend span { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 4px; }
  .legend .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* ── Utility ── */
  .pill-open { background: var(--up-soft); color: var(--up); }
  .pill-closed { background: var(--down-soft); color: var(--down); }
  .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .hero h1 { font-size: 1.5rem; }
    .search-row { max-width: 100%; }
    .kpi-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .kpi-card { padding: 10px 12px; }
    .kpi-n { font-size: 1.1rem; }
    .scatter-wrap canvas { height: 220px; }
    .tbl { font-size: 11px; }
    .tbl th, .tbl td { padding: 5px 6px; }
    .tbl .hide-m { display: none; }
    .strip-brand { font-size: 12px; padding: 6px 10px; }
    .strip-item { padding: 6px 8px; }
    .strip-val { font-size: 10px; }
    .tab-btn { padding: 8px 14px; font-size: 13px; }
    .lb-panel { grid-template-columns: 1fr; gap: 8px; }
    .tier-row { grid-template-columns: 70px 1fr 32px; gap: 6px; }
    .tier-label { font-size: 9px; }
  }
  @media (max-width: 480px) {
    .wrap { padding: 12px 10px 60px; }
    .hero h1 { font-size: 1.2rem; letter-spacing: 1px; }
    .kpi-grid { gap: 4px; }
    .kpi-card { padding: 8px 10px; }
    .kpi-n { font-size: 1rem; }
    .kpi-label { font-size: 10px; }
    .scatter-wrap canvas { height: 170px; }
  }
</style>
</head>
<body>
<div class="strip" id="strip"></div>
<div class="wrap">
  <div class="hero">
    <h1>DATAKOREA</h1>
    <div class="sub">한국 데이터 접근성 지도</div>
    <div class="kpi-grid" id="kpi-grid"></div>
    <div class="search-row">
      <input type="text" id="search" placeholder="기관 또는 데이터셋 검색..." maxlength="200" autocomplete="off">
      <button id="search-btn">검색</button>
    </div>
  </div>
  <div id="leaderboard"></div>
  <div id="tier-hist"></div>
  <div id="scatter-container"></div>
  <div class="tab-bar" id="tab-bar">
    <button class="tab-btn active" data-tab="gov">공공 <span class="tab-count" id="gov-count"></span></button>
    <button class="tab-btn" data-tab="private">민간 <span class="tab-count" id="priv-count"></span></button>
  </div>
  <div id="content"><div class="empty">로딩 중...</div></div>
</div>
<div class="tooltip" id="tooltip"></div>
<script>
(function() {
  'use strict';

  // ── Constants ──
  const CATEGORIES = {
    gov_admin:'공공행정', culture:'문화관광', corporate:'기업정보', transport:'교통',
    weather:'기상·환경', health:'의료', agriculture:'농축수산', realestate:'부동산',
    finance:'금융', social:'사회복지', education:'교육', safety:'재난안전',
    science:'과학기술', diplomacy:'통일외교', legal:'법률', ai:'AI·데이터셋',
    statistics:'통계', geo:'지도·위치', ip:'지식재산', commerce:'커머스',
    energy:'에너지', trade:'무역·관세',
  };
  const PRIV_CATS = {
    tech:'테크', finance:'핀테크', ai:'AI', commerce:'커머스', geo:'지도',
    realestate:'부동산', transport:'모빌리티', logistics:'물류', education:'교육',
    health:'의료', social:'소셜', corporate:'기업정보',
  };
  const LV_COLOR = ['','#00E5A0','#4ade80','#FFB84D','#f59e0b','#f97316','#FF5E7D','#991b1b'];
  const LV_LABEL = ['','오픈','가입','심사','유료','계약','협상','불가'];
  const AUTH_LV = { none:1, api_key:2, oauth:3, approval:3, token:3, contract:5, nda:6 };
  const CAT_COLORS = {
    gov_admin:'#6366f1', culture:'#ec4899', corporate:'#f97316', transport:'#14b8a6',
    health:'#ef4444', weather:'#06b6d4', agriculture:'#84cc16', realestate:'#a855f7',
    finance:'#eab308', social:'#f43f5e', education:'#3b82f6', safety:'#f59e0b',
    science:'#8b5cf6', diplomacy:'#64748b', legal:'#78716c', ai:'#22d3ee',
    statistics:'#94a3b8', geo:'#10b981', ip:'#d946ef', commerce:'#fb923c',
    energy:'#facc15', trade:'#2dd4bf',
  };
  const ACCESS_ORDER = ['api_open','api_paid','partnership','internal','unknown'];
  const ACCESS_COLOR = { api_open:'#00E5A0', api_paid:'#4A9EFF', partnership:'#FFB84D', internal:'#FF5E7D', unknown:'#3a3f4a' };
  const DOMAIN_LABELS = { api_open:'API공개', api_paid:'유료API', partnership:'제휴', internal:'내부전용', unknown:'미확인' };
  const BADGE_CLS = { api_open:'b-open', api_paid:'b-paid', partnership:'b-partner', internal:'b-internal', unknown:'b-unknown' };
  const TIER_COLORS = { L5:'#00E5A0', L4:'#F5A623', L3:'#4A9EFF', L2:'#524842' };
  const TIER_LABELS = { L5:'Data Platform', L4:'API Provider', L3:'File Publisher', L2:'Portal' };
  const TIER_LABELS_PRV = { L4:'API Available', L3:'Partnership', L2:'Mostly Internal' };

  const GOV_REGIONS = [
    '서울특별시','부산광역시','대구광역시','인천광역시','광주광역시','대전광역시','울산광역시',
    '세종특별자치시','경기도','강원특별자치도','충청북도','충청남도','전북특별자치도','전라남도',
    '경상북도','경상남도','제주특별자치도',
  ];
  const GOV_PREFIXES = [...GOV_REGIONS, ...GOV_REGIONS.map(r => r + '교육청')];

  // ── State ──
  let allOrgs = [], activeTab = 'gov', sortKey = 'totalDs', sortAsc = false;
  let scatterFilter = 'gov';
  let expandedSector = null, expandedPrivOrg = null;
  let privDomainData = null;
  let scatterCollapsed = false;
  let statsData = null;
  let allDomains = [];

  // ── Utils ──
  const $ = s => document.querySelector(s);
  function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function fmt(n) { return n >= 1e6 ? (n/1e6).toFixed(1).replace(/\.0$/,'')+'M' : n >= 1000 ? (n/1000).toFixed(1).replace(/\.0$/,'')+'K' : String(n); }
  function safeUrl(u) { try { const p = new URL(u); return (p.protocol==='https:'||p.protocol==='http:') ? u : '#'; } catch { return '#'; } }
  function normalizeUrl(u) { if (!u) return '#'; return safeUrl(u.startsWith('http') ? u : 'https://' + u); }
  function aLv(a) { return AUTH_LV[a] || 7; }
  function catLabel(k) { return CATEGORIES[k] || PRIV_CATS[k] || k; }
  function apiColor(pct) { return pct >= 25 ? 'var(--up)' : pct >= 10 ? 'var(--accent)' : 'var(--dim)'; }

  function tierBadge(tier, isPrivate) {
    if (!tier) return '';
    const color = TIER_COLORS[tier] || '#524842';
    const label = isPrivate ? (TIER_LABELS_PRV[tier] || tier) : (TIER_LABELS[tier] || tier);
    return '<span class="tier-badge" style="background:' + color + '22;color:' + color + ';border:1px solid ' + color + '44">' + esc(tier) + '</span>';
  }

  // ── Ticker animation (romantic detail) ──
  function animateTicker(el, target, duration) {
    if (!el || !target) { if (el) el.textContent = (target || 0).toLocaleString(); return; }
    const start = performance.now();
    function frame(now) {
      const t = Math.min(1, (now - start) / duration);
      const ease = 1 - Math.pow(1 - t, 3);
      el.textContent = Math.round(target * ease).toLocaleString();
      if (t < 1) requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  }

  // ── Strip ──
  function renderStrip(s) {
    const strip = $('#strip');
    strip.innerHTML = '<span class="strip-brand">DATAKOREA</span>';
    const items = [
      ['기관', fmt(s.total_orgs)], ['데이터셋', fmt(s.total_datasets)],
      ['공개', fmt(s.open_datasets)], ['API', fmt(s.active_apis)],
      ['공공 avg', s.avg_score_gov ? s.avg_score_gov + 'pt' : '-'],
      ['민간 avg', s.avg_score_private ? s.avg_score_private + 'pt' : '-'],
    ];
    for (const [lbl, val] of items) {
      const item = document.createElement('div');
      item.className = 'strip-item';
      item.innerHTML = '<span class="strip-val">' + esc(String(val)) + '</span><span class="strip-lbl">' + esc(lbl) + '</span>';
      strip.appendChild(item);
    }
  }

  // ── KPI Grid ──
  function renderKPIGrid(s) {
    const el = $('#kpi-grid');
    if (!el) return;
    const govOrgs = allOrgs.filter(o => o.org_type === 'gov');
    const prvOrgs = allOrgs.filter(o => o.org_type !== 'gov');
    const apiPct = s.total_datasets ? Math.round(s.active_apis / s.total_datasets * 100) : 0;
    const openPct = s.total_datasets ? Math.round(s.open_datasets / s.total_datasets * 100) : 0;

    el.innerHTML = '';
    // Card 1 — Organizations
    const c1 = document.createElement('div'); c1.className = 'kpi-card';
    const n1 = document.createElement('div'); n1.className = 'kpi-n'; n1.id = 'kpi-orgs';
    c1.appendChild(n1);
    const l1 = document.createElement('div'); l1.className = 'kpi-label'; l1.textContent = '등록 기관'; c1.appendChild(l1);
    const s1 = document.createElement('div'); s1.className = 'kpi-sub';
    s1.textContent = '공공 ' + govOrgs.length.toLocaleString() + ' · 민간 ' + prvOrgs.length; c1.appendChild(s1);
    el.appendChild(c1);

    // Card 2 — Datasets
    const c2 = document.createElement('div'); c2.className = 'kpi-card';
    const n2 = document.createElement('div'); n2.className = 'kpi-n'; n2.id = 'kpi-ds';
    c2.appendChild(n2);
    const l2 = document.createElement('div'); l2.className = 'kpi-label'; l2.textContent = '데이터셋'; c2.appendChild(l2);
    const bar2 = document.createElement('div'); bar2.className = 'kpi-bar';
    const fill2 = document.createElement('div'); fill2.className = 'kpi-bar-fill';
    fill2.style.cssText = 'width:0;background:var(--up)'; fill2.dataset.target = openPct;
    bar2.appendChild(fill2); c2.appendChild(bar2);
    const s2 = document.createElement('div'); s2.className = 'kpi-sub';
    s2.textContent = '공개율 ' + openPct + '%'; c2.appendChild(s2);
    el.appendChild(c2);

    // Card 3 — Dual-track score
    const c3 = document.createElement('div'); c3.className = 'kpi-card';
    const n3 = document.createElement('div'); n3.className = 'kpi-n';
    n3.style.cssText = 'font-size:clamp(1rem,2.5vw,1.4rem)';
    n3.innerHTML = '<span style="color:var(--accent)">' + (s.avg_score_gov || '-') + '</span><span style="color:var(--dim);font-size:0.7em"> / </span><span style="color:#B794F6">' + (s.avg_score_private || '-') + '</span>';
    c3.appendChild(n3);
    const l3 = document.createElement('div'); l3.className = 'kpi-label'; l3.textContent = '공공 / 민간 평균 점수'; c3.appendChild(l3);
    const bar3 = document.createElement('div'); bar3.className = 'kpi-bar';
    const fill3 = document.createElement('div'); fill3.className = 'kpi-bar-fill';
    fill3.style.cssText = 'width:0;background:var(--accent)'; fill3.dataset.target = apiPct;
    bar3.appendChild(fill3); c3.appendChild(bar3);
    const s3 = document.createElement('div'); s3.className = 'kpi-sub';
    s3.textContent = 'API 보유 ' + apiPct + '%'; c3.appendChild(s3);
    el.appendChild(c3);

    // Animate
    animateTicker(n1, s.total_orgs, 800);
    animateTicker(n2, s.total_datasets, 900);
    setTimeout(() => {
      fill2.style.width = openPct + '%';
      fill3.style.width = apiPct + '%';
    }, 100);
  }

  // ── Tier Histogram ──
  function renderTierHist() {
    const el = $('#tier-hist');
    if (!el) return;
    el.innerHTML = '';
    const govOrgs = allOrgs.filter(o => o.org_type === 'gov');
    const tiers = { L5: 0, L4: 0, L3: 0, L2: 0 };
    for (const o of govOrgs) { const t = o.data_tier; if (t && tiers[t] !== undefined) tiers[t]++; }
    const maxCount = Math.max(...Object.values(tiers), 1);

    const panel = document.createElement('div'); panel.className = 'tier-panel';
    const head = document.createElement('div'); head.className = 'panel-head';
    head.innerHTML = '<span>DATA TIER 분포</span><span class="badge-src">' + govOrgs.length + ' 공공기관</span>';
    panel.appendChild(head);

    const rows = document.createElement('div'); rows.className = 'tier-rows';
    for (const [tier, count] of Object.entries(tiers)) {
      const row = document.createElement('div'); row.className = 'tier-row';
      const label = document.createElement('div'); label.className = 'tier-label';
      label.textContent = tier + ' ' + (TIER_LABELS[tier] || '');
      const track = document.createElement('div'); track.className = 'tier-track';
      const fill = document.createElement('div'); fill.className = 'tier-fill';
      const pct = Math.round(count / maxCount * 100);
      fill.style.cssText = 'width:0;background:' + (TIER_COLORS[tier] || '#555');
      track.appendChild(fill);
      const ct = document.createElement('div'); ct.className = 'tier-count';
      ct.textContent = count;
      row.appendChild(label); row.appendChild(track); row.appendChild(ct);
      rows.appendChild(row);
      // Animate bars
      setTimeout(() => { fill.style.width = pct + '%'; }, 200);
    }
    panel.appendChild(rows);
    el.appendChild(panel);
  }

  // ── Leaderboard ──
  function renderLeaderboard() {
    const el = $('#leaderboard');
    if (!el || !allOrgs.length) return;
    el.innerHTML = '';

    const pubOrgs = allOrgs
      .filter(o => o.org_type === 'gov' && o.avg_ai_score > 0)
      .sort((a, b) => (b.avg_ai_score || 0) - (a.avg_ai_score || 0))
      .slice(0, 15);

    const prvOrgs = allOrgs
      .filter(o => o.org_type !== 'gov' && o.avg_ai_score > 0)
      .sort((a, b) => (b.avg_ai_score || 0) - (a.avg_ai_score || 0))
      .slice(0, 15);

    const panel = document.createElement('div'); panel.className = 'lb-panel';

    // Public column
    const col1 = document.createElement('div'); col1.className = 'lb-col';
    const head1 = document.createElement('div'); head1.className = 'lb-col-head';
    head1.innerHTML = '<span class="lb-track-pub">PUBLIC — 공공 데이터 품질</span><span class="badge-src">' + pubOrgs.length + '</span>';
    col1.appendChild(head1);
    for (let i = 0; i < pubOrgs.length; i++) {
      col1.appendChild(buildLbRow(pubOrgs[i], i + 1, false));
    }
    panel.appendChild(col1);

    // Private column
    const col2 = document.createElement('div'); col2.className = 'lb-col';
    const head2 = document.createElement('div'); head2.className = 'lb-col-head';
    head2.innerHTML = '<span class="lb-track-prv">PRIVATE — 민간 데이터 개방</span><span class="badge-src">' + prvOrgs.length + '</span>';
    col2.appendChild(head2);
    for (let i = 0; i < prvOrgs.length; i++) {
      col2.appendChild(buildLbRow(prvOrgs[i], i + 1, true));
    }
    panel.appendChild(col2);

    el.appendChild(panel);
  }

  function buildLbRow(org, rank, isPrivate) {
    const row = document.createElement('div'); row.className = 'lb-row';
    const rk = document.createElement('span'); rk.className = 'lb-rank'; rk.textContent = rank;
    const nm = document.createElement('span'); nm.className = 'lb-name'; nm.textContent = org.name;
    const tierColor = TIER_COLORS[org.data_tier] || '#524842';
    const badge = document.createElement('span'); badge.className = 'lb-badge';
    badge.style.cssText = 'background:' + tierColor + '22;color:' + tierColor;
    badge.textContent = org.data_tier || '-';
    const barWrap = document.createElement('span'); barWrap.className = 'lb-bar-wrap';
    const barFill = document.createElement('span'); barFill.className = 'lb-bar-fill';
    barFill.style.cssText = 'width:' + (org.avg_ai_score || 0) + '%;background:' + tierColor;
    barWrap.appendChild(barFill);
    const score = document.createElement('span'); score.className = 'lb-score';
    score.style.color = tierColor;
    score.textContent = org.avg_ai_score || 0;
    row.appendChild(rk); row.appendChild(nm); row.appendChild(badge);
    row.appendChild(barWrap); row.appendChild(score);
    row.addEventListener('click', () => {
      // Navigate to org detail
      activeTab = isPrivate ? 'private' : 'gov';
      document.querySelectorAll('.tab-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.tab === activeTab);
      });
      renderMain();
    });
    return row;
  }

  // ── Main ──
  function renderMain() {
    const c = $('#content'); c.innerHTML = '';
    if (activeTab === 'gov') renderGovContent(c);
    else renderPrivContent(c);
  }

  // ── Gov content ──
  function renderGovContent(c) {
    renderSectorTable(c);
  }

  function renderScatterPanel() {
    const container = $('#scatter-container'); container.innerHTML = '';
    const panel = document.createElement('div'); panel.className = 'panel scatter-panel';
    const head = document.createElement('div'); head.className = 'panel-head';

    const titleWrap = document.createElement('div'); titleWrap.style.cssText = 'display:flex;align-items:center;gap:8px;';
    const title = document.createElement('span'); title.textContent = '접근 난이도 × 데이터 품질';
    const collapseHint = document.createElement('span');
    collapseHint.style.cssText = 'font-size:10px;color:var(--dim);font-family:var(--mono)';
    collapseHint.textContent = scatterCollapsed ? '(펼치기)' : '(접기)';
    titleWrap.appendChild(title); titleWrap.appendChild(collapseHint);

    const rightWrap = document.createElement('div'); rightWrap.style.cssText = 'display:flex;align-items:center;gap:8px;';
    const tog = document.createElement('div'); tog.className = 'toggle-group';
    for (const [k, l] of [['gov','공공'],['private','민간'],['all','전체']]) {
      const btn = document.createElement('span'); btn.className = 'toggle-btn' + (scatterFilter === k ? ' active' : '');
      btn.textContent = l;
      btn.addEventListener('click', (e) => { e.stopPropagation(); scatterFilter = k; renderScatterPanel(); });
      tog.appendChild(btn);
    }
    const filtered = allOrgs.filter(o => scatterFilter === 'all' ? true : scatterFilter === 'gov' ? o.org_type === 'gov' : o.org_type !== 'gov');
    const badge = document.createElement('span'); badge.className = 'badge-src';
    badge.textContent = filtered.length.toLocaleString() + ' 기관';
    rightWrap.appendChild(tog); rightWrap.appendChild(badge);

    head.appendChild(titleWrap); head.appendChild(rightWrap);
    head.addEventListener('click', () => { scatterCollapsed = !scatterCollapsed; renderScatterPanel(); });
    panel.appendChild(head);

    if (!scatterCollapsed) {
      const wrap = document.createElement('div'); wrap.className = 'scatter-wrap';
      const canvas = document.createElement('canvas');
      wrap.appendChild(canvas); panel.appendChild(wrap);
      container.appendChild(panel);
      requestAnimationFrame(() => { if (canvas.isConnected) drawScatter(canvas, filtered); });
    } else {
      container.appendChild(panel);
    }
  }

  function drawScatter(canvas, data) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const W = rect.width, H = rect.height;
    if (!W || !H) return;
    canvas.width = W * dpr; canvas.height = H * dpr;
    const ctx = canvas.getContext('2d'); ctx.scale(dpr, dpr);
    const P = { t: 22, r: 40, b: 30, l: 44 };
    const pW = W - P.l - P.r, pH = H - P.t - P.b;
    const xP = lv => P.l + ((lv - 1) / 8) * pW;
    const yP = sc => P.t + (1 - sc / 100) * pH;

    ctx.fillStyle = '#0e0e10'; ctx.fillRect(0, 0, W, H);

    // Grid
    ctx.strokeStyle = 'rgba(255,248,235,0.04)'; ctx.lineWidth = 1;
    for (let lv = 1; lv <= 7; lv++) { ctx.beginPath(); ctx.moveTo(xP(lv), P.t); ctx.lineTo(xP(lv), H-P.b); ctx.stroke(); }
    for (let s = 0; s <= 100; s += 25) { ctx.beginPath(); ctx.moveTo(P.l, yP(s)); ctx.lineTo(W-P.r, yP(s)); ctx.stroke(); }

    // Quadrant dividers
    ctx.strokeStyle = 'rgba(255,248,235,0.10)'; ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(xP(3.5), P.t); ctx.lineTo(xP(3.5), H-P.b); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(P.l, yP(50)); ctx.lineTo(W-P.r, yP(50)); ctx.stroke();
    ctx.setLineDash([]);

    // Axis labels
    ctx.font = '9px IBM Plex Mono, monospace'; ctx.fillStyle = '#524842'; ctx.textAlign = 'center';
    for (let lv = 1; lv <= 7; lv++) ctx.fillText(LV_LABEL[lv], xP(lv), H - P.b + 14);
    ctx.textAlign = 'right';
    for (let s = 0; s <= 100; s += 25) ctx.fillText(String(s), P.l - 6, yP(s) + 3);

    // Quadrant hints
    ctx.font = '10px Inter, sans-serif'; ctx.fillStyle = 'rgba(255,248,235,0.06)'; ctx.textAlign = 'center';
    ctx.fillText('쉽고 고품질', P.l + pW * 0.2, P.t + 14);
    ctx.fillText('어렵고 저품질', P.l + pW * 0.8, H - P.b - 8);

    // Points
    const pts = [];
    for (const o of data) {
      const lv = aLv(o.easiest_auth);
      const ai = o.avg_ai_score || 0;
      let h = 0;
      for (let i = 0; i < (o.id||'').length; i++) h = ((h << 5) - h + o.id.charCodeAt(i)) | 0;
      const jx = ((h & 0xff) / 255 - 0.5) * (pW / 9) * 0.55;
      const jy = (((h >> 8) & 0xff) / 255 - 0.5) * 10;
      const x = Math.max(P.l + 4, Math.min(W - P.r - 4, xP(lv) + jx));
      const y = Math.max(P.t + 4, Math.min(H - P.b - 4, yP(ai) + jy));
      const r = Math.max(2, Math.min(9, 1.5 + Math.log2(o.total_datasets + 1)));
      const color = o.org_type !== 'gov' ? '#B794F6' : '#F5A623';
      ctx.globalAlpha = 0.15; ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(x, y, r + 3, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 0.65; ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
      pts.push({ x, y, r, o });
    }
    ctx.globalAlpha = 1;

    // Hover
    const tip = $('#tooltip');
    canvas.addEventListener('mousemove', e => {
      const rc = canvas.getBoundingClientRect();
      const mx = e.clientX - rc.left, my = e.clientY - rc.top;
      let best = null, bd = 20;
      for (const p of pts) { const dist = Math.hypot(p.x - mx, p.y - my) - p.r; if (dist < bd) { bd = dist; best = p; } }
      if (best) {
        tip.style.display = 'block';
        tip.style.left = Math.min(e.pageX + 14, window.innerWidth - 280) + 'px';
        tip.style.top = (e.pageY - 10) + 'px';
        const tier = best.o.data_tier || '';
        const dims = best.o.score_dimensions;
        let dimStr = '';
        if (dims) {
          const keys = best.o.org_type !== 'private' ? ['api','fmt','rich','fric'] : ['open','dev','breadth','depth'];
          dimStr = '<br><span style="font-size:10px;color:var(--dim)">' + keys.map(k => k + ':' + (dims[k]||0)).join(' ') + '</span>';
        }
        // Enhanced private tooltip: domain accessibility breakdown
        let privExtra = '';
        if (best.o.org_type !== 'gov') {
          const dom = privDomainData?.[best.o.id];
          if (dom && dom.total_domains > 0) {
            const parts = [];
            if (dom.open_domains) parts.push('<span style="color:#00E5A0">공개 ' + dom.open_domains + '</span>');
            if (dom.paid_domains) parts.push('<span style="color:#4A9EFF">유료 ' + dom.paid_domains + '</span>');
            if (dom.partner_domains) parts.push('<span style="color:#FFB84D">제휴 ' + dom.partner_domains + '</span>');

  // ── Region grouping ──
  function groupByRegion(orgs) {
    const buckets = {}, standalone = [];
    for (const o of orgs) {
      let matched = false;
      for (const pfx of GOV_PREFIXES) {
        if (o.name.startsWith(pfx + ' ') && o.name !== pfx) { (buckets[pfx] = buckets[pfx] || []).push(o); matched = true; break; }
      }
      if (!matched) standalone.push(o);
    }
    const items = [], used = new Set();
    for (const [pfx, children] of Object.entries(buckets)) {
      if (children.length < 2) { standalone.push(...children); continue; }
      const pi = standalone.findIndex(o => o.name === pfx);
      const parent = pi >= 0 ? standalone[pi] : null;
      if (parent) used.add(parent.id);
      const totalDs = children.reduce((s, o) => s + o.total_datasets, 0) + (parent?.total_datasets || 0);
      const totalApis = children.reduce((s, o) => s + o.active_apis, 0) + (parent?.active_apis || 0);
      items.push({ type: 'group', label: pfx, children: children.sort((a, b) => b.total_datasets - a.total_datasets), parent, totalDs, totalApis });
    }
    const rest = standalone.filter(o => !used.has(o.id)).sort((a, b) => b.total_datasets - a.total_datasets);
    for (const o of rest) items.push({ type: 'org', org: o, totalDs: o.total_datasets, totalApis: o.active_apis });
    items.sort((a, b) => b.totalDs - a.totalDs);
    return items;
  }

    if (dom.website) {
      const a = document.createElement('a'); a.className = 'od-link'; a.href = safeUrl(dom.website);
      a.target = '_blank'; a.rel = 'noopener'; a.textContent = '웹사이트';
      a.addEventListener('click', e => e.stopPropagation()); linkEls.push(a);
    }
    if (linkEls.length) {
      const linkRow = document.createElement('tr'); linkRow.className = 'dom-sec-row dom-row';
      linkRow.style.animationDelay = delay + 'ms'; delay += 25;
      const linkTd = document.createElement('td'); linkTd.colSpan = 4;
      linkEls.forEach((el, i) => { if (i > 0) linkTd.append(' · '); linkTd.appendChild(el); });
      linkRow.appendChild(linkTd); insertAfter.after(linkRow); insertAfter = linkRow;
    }

    const DOM_CAP = 30;
    if (openDoms.length) {
      const secRow = document.createElement('tr'); secRow.className = 'dom-sec-row dom-row';
      secRow.style.animationDelay = delay + 'ms'; delay += 25;
      const secTd = document.createElement('td'); secTd.colSpan = 4;
      secTd.innerHTML = '<span class="dom-sec-label" style="color:#00E5A0">' + openDoms.length + ' 접근 가능</span>';
      secRow.appendChild(secTd); insertAfter.after(secRow); insertAfter = secRow;
      for (const d of openDoms.slice(0, DOM_CAP)) { const dr = buildDomRow(d, delay); delay += 25; insertAfter.after(dr); insertAfter = dr; }
      if (openDoms.length > DOM_CAP) { const nr = document.createElement('tr'); nr.className = 'dom-row'; nr.style.animationDelay = delay + 'ms'; delay += 25;
        const ntd = document.createElement('td'); ntd.colSpan = 4; ntd.style.cssText = 'font-size:10px;color:var(--dim);padding-left:24px !important'; ntd.textContent = '외 ' + (openDoms.length - DOM_CAP) + '개';
        nr.appendChild(ntd); insertAfter.after(nr); insertAfter = nr; }
    }

    if (lockedDoms.length) {
      const secRow = document.createElement('tr'); secRow.className = 'dom-sec-row dom-row';
      secRow.style.animationDelay = delay + 'ms'; delay += 25;
      const secTd = document.createElement('td'); secTd.colSpan = 4;
      secTd.innerHTML = '<span class="dom-sec-label" style="color:#FF5E7D">' + lockedDoms.length + ' 잠긴 데이터</span>';
      secRow.appendChild(secTd); insertAfter.after(secRow); insertAfter = secRow;
      for (const d of lockedDoms.slice(0, DOM_CAP)) { const dr = buildDomRow(d, delay); delay += 25; insertAfter.after(dr); insertAfter = dr; }
      if (lockedDoms.length > DOM_CAP) { const nr = document.createElement('tr'); nr.className = 'dom-row'; nr.style.animationDelay = delay + 'ms'; delay += 25;
        const ntd = document.createElement('td'); ntd.colSpan = 4; ntd.style.cssText = 'font-size:10px;color:var(--dim);padding-left:24px !important'; ntd.textContent = '외 ' + (lockedDoms.length - DOM_CAP) + '개';
        nr.appendChild(ntd); insertAfter.after(nr); insertAfter = nr; }
    }
  }

  function buildDomRow(d, delay) {
    const tr = document.createElement('tr'); tr.className = 'dom-row';
    tr.style.animationDelay = delay + 'ms';
    const tdN = document.createElement('td'); tdN.style.paddingLeft = '24px';
    tdN.innerHTML = '<span style="font-weight:500">' + esc(d.name) + '</span>';
    const tdScale = document.createElement('td'); tdScale.className = 'hide-m';
    tdScale.style.cssText = 'font-size:10px;color:var(--dim);font-family:var(--mono)';
    tdScale.textContent = d.scale || '';
    const tdBadge = document.createElement('td'); tdBadge.className = 'hide-m';
    const badge = document.createElement('span');
    badge.className = 'dom-badge ' + (BADGE_CLS[d.accessibility] || 'b-unknown');
    badge.textContent = DOMAIN_LABELS[d.accessibility] || d.accessibility;
    tdBadge.appendChild(badge);
    const tdNote = document.createElement('td');
    tdNote.style.cssText = 'font-size:10px;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';
    if (d.api_note) { tdNote.style.color = '#00E5A0'; tdNote.textContent = d.api_note; tdNote.title = d.api_note; }
    else if (d.barrier) { tdNote.style.color = '#a07070'; tdNote.textContent = d.barrier; tdNote.title = d.barrier; }
    tr.appendChild(tdN); tr.appendChild(tdScale); tr.appendChild(tdBadge); tr.appendChild(tdNote);
    return tr;
  }

  // ── Search ──
  function doSearch(q) {
    if (!q || q.length < 2) return;
    const c = $('#content'); c.innerHTML = '';
    const lower = q.toLowerCase();

    const matched = allOrgs.filter(o =>
      (o.name && o.name.toLowerCase().includes(lower)) ||
      (o.name_en && o.name_en.toLowerCase().includes(lower)) ||
      (o.summary && o.summary.toLowerCase().includes(lower)) ||
      (o.primary_business && o.primary_business.toLowerCase().includes(lower))
    );

    const back = document.createElement('span'); back.className = 'sr-back'; back.textContent = '← 전체 보기';
    back.addEventListener('click', () => { $('#search').value = ''; renderMain(); });
    c.appendChild(back);

    const ct = document.createElement('div'); ct.className = 'sr-count';
    ct.textContent = '"' + q + '" → ' + matched.length + '건'; c.appendChild(ct);

    if (!matched.length) {
      const empty = document.createElement('div'); empty.className = 'empty';
      empty.textContent = '검색 결과 없음'; c.appendChild(empty); return;
    }

    const govResults = matched.filter(o => o.org_type === 'gov');
    const prvResults = matched.filter(o => o.org_type !== 'gov');

    if (govResults.length) {
      const sec = document.createElement('div'); sec.className = 'sr-section';
      sec.textContent = '공공 (' + govResults.length + ')'; c.appendChild(sec);
      for (const o of govResults.slice(0, 50)) {
        c.appendChild(buildSearchItem(o));
      }
      if (govResults.length > 50) {
        const more = document.createElement('div'); more.className = 'empty';
        more.textContent = '외 ' + (govResults.length - 50) + '건'; c.appendChild(more);
      }
    }
    if (prvResults.length) {
      const sec = document.createElement('div'); sec.className = 'sr-section';
      sec.textContent = '민간 (' + prvResults.length + ')'; c.appendChild(sec);
      for (const o of prvResults.slice(0, 50)) {
        c.appendChild(buildSearchItem(o));
      }
      if (prvResults.length > 50) {
        const more = document.createElement('div'); more.className = 'empty';
        more.textContent = '외 ' + (prvResults.length - 50) + '건'; c.appendChild(more);
      }
    }
  }

  function buildSearchItem(o) {
    const it = document.createElement('div'); it.className = 'sr-item';
    const nm = document.createElement('div'); nm.className = 'sr-ds'; nm.textContent = o.name;
    it.appendChild(nm);
    const info = document.createElement('div'); info.className = 'sr-org';
    info.textContent = catLabel(o.industry) + ' · ' + (o.org_type === 'gov' ? '공공' : '민간')
      + ' · 데이터셋 ' + fmt(o.total_datasets) + ' · API ' + o.active_apis;
    it.appendChild(info);
    if (o.summary) {
      const desc = document.createElement('div'); desc.className = 'sr-desc'; desc.textContent = o.summary;
      it.appendChild(desc);
    }
    const tags = document.createElement('div'); tags.className = 'sr-tags';
    if (o.data_tier) {
      tags.insertAdjacentHTML('beforeend', tierBadge(o.data_tier, o.org_type !== 'gov'));
    }
    if (o.website) {
      const a = document.createElement('a'); a.className = 'od-link'; a.style.cssText = 'font-size:11px;margin-left:6px;';
      a.href = normalizeUrl(o.website); a.target = '_blank'; a.rel = 'noopener'; a.textContent = '웹사이트';
      a.addEventListener('click', e => e.stopPropagation()); tags.appendChild(a);
    }
    it.appendChild(tags);
    return it;
  }

  // ── Init ──
  async function init() {
    if (window.innerWidth < 768) scatterCollapsed = true;
    try {
      // Resolve base path for static JSON (works on both /datakorea/ and GitHub Pages)
      const base = location.pathname.replace(/\/[^/]*$/, '/');

      const orgsR = await fetch(base + 'data/organizations.json');
      if (!orgsR.ok) throw new Error('Data load failed');
      allOrgs = await orgsR.json();

      // Load domains in background (1.5MB, not needed for initial render)
      fetch(base + 'data/domains.json').then(r => r.ok ? r.json() : []).then(rawDomains => {
        allDomains = rawDomains;
        const domByOrg = {};
        for (const d of rawDomains) {
          if (!domByOrg[d.org_id]) domByOrg[d.org_id] = [];
          domByOrg[d.org_id].push(d);
        }
        privDomainData = {};
        for (const [orgId, doms] of Object.entries(domByOrg)) {
          const org = allOrgs.find(o => o.id === orgId);
          privDomainData[orgId] = {
            total_domains: doms.length,
            open_domains: doms.filter(d => d.accessibility === 'api_open').length,
            paid_domains: doms.filter(d => d.accessibility === 'api_paid').length,
            partner_domains: doms.filter(d => d.accessibility === 'partnership').length,
            internal_domains: doms.filter(d => d.accessibility === 'internal').length,
            primary_business: org?.primary_business,
            dev_portal_url: org?.dev_portal_url,
            website: org?.website,
            domains: doms.map(d => ({
              name: d.domain_name,
              domain_key: d.domain_key,
              description: d.description,
              scale: d.estimated_scale,
              accessibility: d.accessibility,
              api_note: d.public_api_note,
              barrier: d.barrier_note,
            })),
          };
        }
        // Re-render if on private tab
        if (activeTab === 'private') renderMain();
      }).catch(() => console.error('[DataKorea] domains load failed'));

      // Compute stats from loaded data
      const govOrgs = allOrgs.filter(o => o.org_type === 'gov');
      const prvOrgs = allOrgs.filter(o => o.org_type !== 'gov');
      const totalDs = allOrgs.reduce((s, o) => s + (o.total_datasets || 0), 0);
      const openDs = allOrgs.reduce((s, o) => s + (o.open_datasets || 0), 0);
      const activeApis = allOrgs.reduce((s, o) => s + (o.active_apis || 0), 0);
      const govScores = govOrgs.filter(o => o.avg_ai_score > 0);
      const prvScores = prvOrgs.filter(o => o.avg_ai_score > 0);
      statsData = {
        total_orgs: allOrgs.length,
        total_datasets: totalDs,
        open_datasets: openDs,
        active_apis: activeApis,
        avg_score_gov: govScores.length ? Math.round(govScores.reduce((s, o) => s + o.avg_ai_score, 0) / govScores.length) : 0,
        avg_score_private: prvScores.length ? Math.round(prvScores.reduce((s, o) => s + o.avg_ai_score, 0) / prvScores.length) : 0,
      };

      renderStrip(statsData);
      renderKPIGrid(statsData);

      const govCount = govOrgs.length;
      const privCount = prvOrgs.length;
      const gc = $('#gov-count'); if (gc) gc.textContent = govCount.toLocaleString();
      const pc = $('#priv-count'); if (pc) pc.textContent = privCount;

      renderLeaderboard();
      renderTierHist();
      renderScatterPanel();
      renderMain();
    } catch (e) { console.error('[DataKorea]', e); $('#content').innerHTML = '<div class="empty">데이터 로드 실패</div>'; }

    // Tab events
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const tab = btn.dataset.tab;
        if (tab === activeTab) return;
        activeTab = tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderMain();
      });
    });

    // Search events
    $('#search-btn').addEventListener('click', () => doSearch($('#search').value.trim()));
    $('#search').addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch($('#search').value.trim());
      if (e.key === 'Escape') { e.target.value = ''; renderMain(); }
    });
  }

  init();
})();
</script>
</body>
</html>
